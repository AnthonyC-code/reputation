name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: passport
          POSTGRES_PASSWORD: passport
          POSTGRES_DB: passport
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U passport"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: api
    env:
      DATABASE_URL: postgres://passport:passport@localhost:5432/passport?sslmode=disable
      APP_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Check sqlc output is committed
        run: |
          go tool sqlc generate
          git diff --exit-code
      - name: Migrations apply cleanly (and are idempotent)
        run: |
          go run ./cmd/passportd migrate
          go run ./cmd/passportd migrate
      - name: Test
        run: go test ./...

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: web/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Build
        run: pnpm build
