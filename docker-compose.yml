services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: passport
      POSTGRES_PASSWORD: passport
      POSTGRES_DB: passport
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U passport"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  dbdata:
