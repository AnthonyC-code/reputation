services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: passport
      POSTGRES_PASSWORD: passport
      POSTGRES_DB: passport
    ports:
      # Host 5433: a native Postgres commonly occupies 5432 (it does on the
      # founder's machine). DATABASE_URL in .env.example matches.
      - "5433:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U passport"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  dbdata:
